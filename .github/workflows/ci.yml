name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest test_app.py -v --cov=app --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      if: always()

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black

    - name: Run flake8
      run: flake8 app.py test_app.py --max-line-length=100
      continue-on-error: true

    - name: Check formatting with black
      run: black --check app.py test_app.py
      continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Determine environment and tags
      id: env
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "environment=prod" >> $GITHUB_OUTPUT
          echo "tags=${{ secrets.DOCKER_USERNAME }}/fibonacci-api:latest,${{ secrets.DOCKER_USERNAME }}/fibonacci-api:prod-${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/fibonacci-api:prod" >> $GITHUB_OUTPUT
          echo "push=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          echo "environment=dev" >> $GITHUB_OUTPUT
          echo "tags=${{ secrets.DOCKER_USERNAME }}/fibonacci-api:dev,${{ secrets.DOCKER_USERNAME }}/fibonacci-api:dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "push=true" >> $GITHUB_OUTPUT
        else
          echo "environment=test" >> $GITHUB_OUTPUT
          echo "tags=${{ secrets.DOCKER_USERNAME }}/fibonacci-api:test-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "push=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: steps.env.outputs.push == 'true'

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ steps.env.outputs.push }}
        tags: ${{ steps.env.outputs.tags }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fibonacci-api:${{ steps.env.outputs.environment }}
        cache-to: type=inline
        build-args: |
          BUILD_ENV=${{ steps.env.outputs.environment }}

